{% extends "base.html" %}
{% block content %}
<h2 class="mb-3">Edit Base Prompt</h2>
<form method="post" action="/edit_base">
  <div class="mb-3">
    <label for="base_prompt" class="form-label">Base Prompt (this text will be used as the BASE prompt when generating system prompts)</label>
    <textarea id="base_prompt" name="base_prompt" class="form-control" rows="12">{{ base_prompt }}</textarea>
  </div>
  <div>
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn btn-secondary" href="/">Cancel</a>
  </div>
</form>
{% endblock %}
