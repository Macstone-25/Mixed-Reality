name: CI

on:
  push:
    branches: main
  pull_request:

jobs:
  lint:
    runs-on: macos-latest
    name: Lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to diff base..head reliably
          
      - name: Find modified files
        id: changed
        shell: bash
        run: |
          set -euo pipefail
      
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
      
          if [[ -z "$BASE_SHA" || -z "$HEAD_SHA" ]]; then
            echo "Missing PR SHAs (is this running on pull_request?)"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
      
          # Make sure both commits exist locally (checkout fetch-depth: 0 recommended)
          git fetch --no-tags --prune --depth=1 origin "$BASE_SHA" "$HEAD_SHA" || true
      
          # Collect changed .swift files (A/C/M/R), one per line
          FILES="$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- | grep -E '\.swift$' || true)"
      
          if [[ -z "$FILES" ]]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
      
          printf '%s\n' "$FILES" > changed_swift_files.txt
      
          # Count lines
          COUNT="$(wc -l < changed_swift_files.txt | tr -d ' ')"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Run swift-format
        if: ${{ !cancelled() && steps.changed.outputs.count != '0' }}
        shell: bash
        run: |
          set -euo pipefail
          SWIFTFORMAT="$(xcrun --find swift-format)"
          "$SWIFTFORMAT" lint --strict --parallel $(cat changed_swift_files.txt)

      - name: Install SwiftLint
        if: ${{ !cancelled() && steps.changed.outputs.count != '0' }}
        run: brew install swiftlint
  
      - name: Run SwiftLint
        if: ${{ !cancelled() && steps.changed.outputs.count != '0' }}
        shell: bash
        run: |
          set -euo pipefail
          swiftlint lint --strict $(cat changed_swift_files.txt)
          
  test:
    runs-on: macos-26
    name: Test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/Homebrew
            ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-xcbeautify

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Cache Swift PM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Boot Simulator
        run: xcrun simctl boot "Apple Vision Pro"
          
      - name: Run Unit Tests
        working-directory: ./src
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme MixedRealityTests \
            -destination 'platform=visionOS Simulator,name=Apple Vision Pro' \
            -derivedDataPath '../build' \
            -resultBundlePath 'TestResults.xcresult' \
            -parallel-testing-enabled NO | xcbeautify --renderer github-actions
