name: CI

on:
  push:
    branches: main
  pull_request:

jobs:
  lint:
    runs-on: macos-latest
    name: Lint

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to diff base..head reliably

      - name: Find modified files
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          mapfile -t FILES < <(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" | grep -E '\.swift$' || true)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "${FILES[@]}" > changed_swift_files.txt
          echo "count=${#FILES[@]}" >> "$GITHUB_OUTPUT"

      - name: swift-format lint
        if: steps.changed.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          SWIFTFORMAT="$(xcrun --find swift-format)"
          "$SWIFTFORMAT" lint --strict --parallel $(cat changed_swift_files.txt)

      - name: swift-format check
        if: steps.changed.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          SWIFTFORMAT="$(xcrun --find swift-format)"
          "$SWIFTFORMAT" format --in-place --parallel $(cat changed_swift_files.txt)
          git diff --exit-code

      - name: SwiftLint
        if: steps.changed.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail

          # Build SCRIPT_INPUT_FILE_* variables for --use-script-input-files
          i=0
          while IFS= read -r f; do
            export "SCRIPT_INPUT_FILE_$i=$f"
            i=$((i+1))
          done < changed_swift_files.txt
          export SCRIPT_INPUT_FILE_COUNT="$i"

          swiftlint lint --strict --use-script-input-files
