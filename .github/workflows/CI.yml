name: CI

on:
  push:
    branches: main
  pull_request:

jobs:
  lint:
    runs-on: macos-latest
    name: Lint

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to diff base..head reliably

      - name: Find modified files
        id: changed
        shell: bash
        run: |
          set -euo pipefail
      
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
      
          if [[ -z "$BASE_SHA" || -z "$HEAD_SHA" ]]; then
            echo "Missing PR SHAs (is this running on pull_request?)"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
      
          # Make sure both commits exist locally (checkout fetch-depth: 0 recommended)
          git fetch --no-tags --prune --depth=1 origin "$BASE_SHA" "$HEAD_SHA" || true
      
          # Collect changed .swift files (A/C/M/R), one per line
          FILES="$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- | grep -E '\.swift$' || true)"
      
          if [[ -z "$FILES" ]]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
      
          printf '%s\n' "$FILES" > changed_swift_files.txt
      
          # Count lines
          COUNT="$(wc -l < changed_swift_files.txt | tr -d ' ')"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: swift-format lint
        if: steps.changed.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          SWIFTFORMAT="$(xcrun --find swift-format)"
          "$SWIFTFORMAT" lint --strict --parallel $(cat changed_swift_files.txt)

      - name: swift-format check
        if: steps.changed.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          SWIFTFORMAT="$(xcrun --find swift-format)"
          "$SWIFTFORMAT" format --in-place --parallel $(cat changed_swift_files.txt)
          git diff --exit-code

      - name: SwiftLint
        if: steps.changed.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail

          # Build SCRIPT_INPUT_FILE_* variables for --use-script-input-files
          i=0
          while IFS= read -r f; do
            export "SCRIPT_INPUT_FILE_$i=$f"
            i=$((i+1))
          done < changed_swift_files.txt
          export SCRIPT_INPUT_FILE_COUNT="$i"

          swiftlint lint --strict --use-script-input-files
  test:
    runs-on: macos-26
    name: Test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install xcbeautify
        run: brew install xcbeautify
        
      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Change Directory
        run: cd src

      - name: Boot Simulator
        # This "warms up" the simulator so xcodebuild doesn't time out
        run: |
          xcrun simctl list devices visionOS
          xcrun simctl boot "Apple Vision Pro" || true

      - name: Run visionOS Tests
        # Run unit tests and pipe the output to "xcbeautify" for readability
        run: |
          set -o pipefail && xcodebuild test \
            -scheme MixedRealityTests \
            -destination 'platform=visionOS Simulator,name=Apple Vision Pro' \
            -parallel-testing-enabled NO | xcbeautify --renderer github-actions
